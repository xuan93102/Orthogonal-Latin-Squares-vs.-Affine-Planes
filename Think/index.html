<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finite Field Affine Lines Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>

<body>

    <h1>有限體仿射平面 (Affine Plane)</h1>
    <div class="subtitle">視覺化 GF(q) 上的直線方程 y = ax + b</div>

    <div class="view-tabs" role="tablist">
        <button id="tab-2d" class="field-tab active" type="button" aria-selected="true">2D</button>
        <button id="tab-3d" class="field-tab" type="button" aria-selected="false">3D</button>
    </div>

    <div class="main-container">
        <label class="selection-title">選擇基底域大小</label>

        <div class="selection-rows">
            <div class="selection-row">
                <span class="formula">q = p<sup>k</sup></span>
                <span class="formula-label">p:</span>
                <select id="pk-p-input" class="num-input" style="padding: 6px;">
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="5">5</option>
                    <option value="7">7</option>
                    <option value="11">11</option>
                    <option value="13">13</option>
                </select>
                <span class="formula-label">k:</span>
                <input type="number" id="k-input" min="1" max="4" value="2" class="num-input">
                <button id="run-k" class="run-btn">RUN</button>
            </div>
        </div>

    </div>

    <div class="main-container">

        <div class="controls">
            <div class="control-group">
                <label id="a-slider-label-text">選擇斜率 (a 值)</label>
                <div class="slider-container">
                    <input type="range" id="a-slider" min="-1" max="3" value="1" step="1">
                </div>
                <div class="a-slider-label" id="a-slider-val">a = 01</div>
            </div>

            <div class="control-group" id="b-slider-group" style="display: none;">
                <label>選擇係數 (b 值)</label>
                <div class="slider-container">
                    <input type="range" id="b-slider" min="0" max="3" value="1" step="1">
                </div>
                <div class="a-slider-label" id="b-slider-val">b = 01</div>
            </div>

            <div id="value-select-wrapper" class="value-select-wrapper">
                <label>選擇顯示數值</label>
                <div class="value-select-row">
                    <select id="value-select" class="num-input" style="padding: 6px; width: auto; min-width: 100px;">
                        <option value="all">All</option>
                    </select>
                    <div class="a-slider-label" id="value-select-label"></div>
                </div>
            </div>

            <div class="equation-display" id="equation-display"
                style="flex-direction: column; align-items: flex-start; gap: 8px;">
                <div id="eq-display-2d">2D: y = 01 · x + c</div>
                <div id="eq-display-3d">3D: z = 01 · x + 01 · y + c</div>
            </div>

            <div class="field-info" id="field-info">
                <div class="info-title">體算術 (Field Arithmetic)</div>
                <div id="field-desc"></div>
            </div>

        </div>

        <div class="bottom-row">
            <div id="view-2d"
                style="width: 100%; display: flex; flex-direction: column; align-items: stretch; justify-content: center; gap: 24px;">
                <div class="panel-tabs" role="tablist" aria-label="2D 視圖選擇">
                    <button id="tab-2d-line" class="panel-tab active" type="button" aria-selected="true">線圖</button>
                    <button id="tab-2d-latin" class="panel-tab" type="button" aria-selected="false">Latin 方陣</button>
                </div>

                <div id="value-placeholder-2d" class="value-placeholder value-placeholder-2d"></div>

                <div class="panel-content panel-2d-line">
                    <div id="viz-2d" class="visualization"
                        style="flex: 1; min-width: 350px; display: flex; align-items: center; justify-content: center;">
                        <svg id="draw-canvas" overflow="visible">
                        </svg>
                    </div>
                </div>

                <div class="panel-content panel-2d-latin hidden">
                    <div class="visualization latin-square-container"
                        style="flex: 1; min-width: 350px; justify-content: center; margin: 0; padding-top: 24px; padding-bottom: 24px;">
                        <div class="latin-square-title"
                            style="margin-bottom: 12px; font-size: 1.1em; color: var(--primary-color);">拉丁方陣 (2D: c = y - ax)</div>
                        <div class="latin-square" id="latin-square">
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-3d"
                style="width: 100%; display: none; flex-direction: column; align-items: stretch; justify-content: center; gap: 24px;">
                <div id="controls-3d" class="selection-rows controls-3d" style="display: none; margin-bottom: 20px; justify-content: center;">
                    <div class="selection-row axis-selection-row" style="gap: 12px; flex-wrap: nowrap;">
                        <label style="color: var(--text-color); font-weight: 600;">3D 軸切片:</label>
                        <div style="display: flex; gap: 8px; align-items: center; flex-wrap: nowrap;">
                            <span style="color: var(--accent-color);">X:</span>
                            <select id="axis-x-select" class="num-input"></select>
                            <span style="color: var(--accent-color);">Y:</span>
                            <select id="axis-y-select" class="num-input"></select>
                            <span style="color: var(--accent-color);">Z:</span>
                            <select id="axis-z-select" class="num-input"></select>
                        </div>
                        <div id="value-placeholder-3d" class="value-placeholder value-placeholder-3d"></div>
                    </div>
                </div>

                <div class="panel-tabs" role="tablist" aria-label="3D 視圖選擇">
                    <button id="tab-3d-lines" class="panel-tab active" type="button" aria-selected="true">線圖</button>
                    <button id="tab-3d-surface" class="panel-tab" type="button" aria-selected="false">3D線圖填色版</button>
                    <button id="tab-3d-plotly" class="panel-tab" type="button" aria-selected="false">填色面</button>
                    <button id="tab-3d-latin" class="panel-tab" type="button" aria-selected="false">疊層平面</button>
                </div>

                <div class="panel-content panel-3d-lines">
                    <div class="visualization"
                        style="flex: 1; min-width: 350px; height: 500px; position: relative; padding-top: 40px;">
                        <div class="latin-square-title"
                            style="position: absolute; top: 15px; left: 0; width: 100%; text-align: center; z-index: 10; font-size: 1.1em; color: var(--primary-color);">
                            3D 線圖 (Curves)</div>
                        <div id="viz-3d-lines"
                            style="width: 100%; height: 100%; cursor: grab; border-radius: 8px; overflow: hidden;"></div>
                    </div>
                </div>

                <div class="panel-content panel-3d-surface hidden">
                    <div class="visualization"
                        style="flex: 1; min-width: 350px; height: 500px; position: relative; padding-top: 40px;">
                        <div class="latin-square-title"
                            style="position: absolute; top: 15px; left: 0; width: 100%; text-align: center; z-index: 10; font-size: 1.1em; color: var(--primary-color);">
                            3D 線圖填色版 (Curves)</div>
                        <div id="viz-3d-surface"
                            style="width: 100%; height: 100%; cursor: grab; border-radius: 8px; overflow: hidden;"></div>
                    </div>
                </div>

                <div class="panel-content panel-3d-plotly hidden">
                    <div class="visualization"
                        style="flex: 1; min-width: 350px; height: 500px; position: relative; padding-top: 40px;">
                        <div class="latin-square-title"
                            style="position: absolute; top: 15px; left: 0; width: 100%; text-align: center; z-index: 10; font-size: 1.1em; color: var(--primary-color);">
                            3D 填色面 (Surface)</div>
                        <div id="viz-3d-plotly"
                            style="width: 100%; height: 100%; border-radius: 8px; overflow: hidden; background: transparent;">
                        </div>
                    </div>
                </div>

                <div class="panel-content panel-3d-latin hidden">
                    <div class="visualization"
                        style="flex: 1; min-width: 350px; height: 500px; position: relative; padding-top: 40px;">
                        <div class="latin-square-title"
                            style="position: absolute; top: 15px; left: 0; width: 100%; text-align: center; z-index: 10; font-size: 1.1em; color: var(--primary-color);">
                            3D 疊層平面 (Latin Square: z = ax + by + c)</div>
                        <div class="three-toggle-overlay">
                            <label>
                                <input type="checkbox" id="show-number-check">
                                <span>顯示數字</span>
                            </label>
                        </div>
                        <div id="viz-3d-latin"
                            style="width: 100%; height: 100%; cursor: grab; border-radius: 8px; overflow: hidden;"></div>
                    </div>
                </div>
            </div>
        </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="main.js"></script>
</body>

</html>
